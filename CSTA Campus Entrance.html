<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTA Campus Entrance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background-color: black; overflow: hidden; }

        .entrance-link {
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
        }

        .entrance-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .entrance-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: transform 1.2s ease, filter 0.8s ease;
        }

        .entrance-link:hover img {
            transform: scale(1.1);
            filter: brightness(60%);
        }

        .overlay-text {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: "Times New Roman", Times, serif;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.9);
            letter-spacing: 4px;
            text-transform: uppercase;
            border: 4px solid white; /* Matches your broadline style */
            padding: 15px 40px;
            background: rgba(128, 0, 0, 0.6); 
            transition: all 0.4s ease;
            white-space: nowrap;
            z-index: 10;
        }

        .entrance-link:hover .overlay-text {
            background: rgba(128, 0, 0, 0.9);
            letter-spacing: 8px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            .overlay-text { font-size: 18px; padding: 10px 20px; bottom: 20%; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="entrance-link">
        <div class="entrance-container">
            <img src="CSTA.jpg" alt="CSTA Campus Entrance">
            <div class="overlay-text">Click to Enter Profile</div>
        </div>
    </a>

</body>
</html>
